name: Fetch from Smartlead + AimFox into data/cache.json

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch from Smartlead + AimFox into data/cache.json
        env:
          SMARTLEAD_API_KEY: ${{ secrets.SMARTLEAD_API_KEY }}
          AIMFOX_API_KEY: ${{ secrets.AIMFOX_API_KEY }}
          CLIENT_FILTER: FEAAM
        run: python sync_cache.py

      - name: Commit cache.json to data-cache branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the data-cache branch
          git fetch origin data-cache 2>/dev/null && git checkout data-cache \
            || git checkout --orphan data-cache

          # Copy fresh data + static site files from master
          git checkout master -- data/cache.json static/ templates/index.html

          # Promote index.html to root with corrected asset paths
          sed 's|href="/static/|href="static/|g; s|src="/static/|src="static/|g' \
            templates/index.html > index.html

          # Remove the templates copy we just used as source
          git rm -rf templates/ 2>/dev/null || true

          git add index.html static/ data/cache.json
          git diff --cached --quiet \
            || git commit -m "chore: update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin data-cache
