name: Fetch from Smartlead + AimFox into data/cache.json

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch from Smartlead + AimFox into data/cache.json
        env:
          SMARTLEAD_API_KEY: ${{ secrets.SMARTLEAD_API_KEY }}
          AIMFOX_API_KEY: ${{ secrets.AIMFOX_API_KEY }}
          CLIENT_FILTER: FEAAM
        run: python sync_cache.py

      - name: Commit cache.json to data-cache branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the generated files before switching branches
          mkdir -p /tmp/site/data /tmp/site/static
          cp data/cache.json /tmp/site/data/cache.json
          cp -r static/. /tmp/site/static/
          sed 's|href="/static/|href="static/|g; s|src="/static/|src="static/|g' \
            templates/index.html > /tmp/site/index.html

          # Switch to (or create) the data-cache branch
          git fetch origin data-cache 2>/dev/null \
            && git checkout data-cache \
            || { git checkout --orphan data-cache; git rm -rf . --quiet 2>/dev/null || true; }

          # Restore files into the branch working tree
          mkdir -p data static
          cp /tmp/site/data/cache.json data/cache.json
          cp -r /tmp/site/static/. static/
          cp /tmp/site/index.html index.html

          git add -f index.html static/ data/cache.json
          git diff --cached --quiet \
            || git commit -m "chore: update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin data-cache
